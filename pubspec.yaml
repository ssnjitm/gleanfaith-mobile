name: glean_faith_app
description: "Bible Quiz App with leaderboard, audio, blogs, PDF, videos, articles"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Functional Programming
  fpdart: ^1.1.1

  # Routing
  go_router: ^14.8.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Logging
  talker: ^5.1.17
  talker_dio_logger: ^5.1.17
  talker_flutter: ^5.1.17

  # Storage
  flutter_secure_storage: ^10.3.1
  objectbox: ^4.1.0
  objectbox_flutter_libs: ^4.1.0
  path_provider: ^2.1.5

  # Utilities
  equatable: ^2.0.7
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  objectbox_generator: ^4.1.0

flutter:
  uses-material-design: true
